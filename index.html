<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnacoEs | C2 Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; }
        .glass { background: #111; border: 1px solid #333; }
        .tab-content { display: none; }
        .tab-active { display: grid; }
        .btn-tool { @apply bg-slate-900 border border-slate-700 p-2 rounded text-[8px] hover:border-blue-500 hover:text-blue-400 transition cursor-pointer text-center uppercase font-bold; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="p-3 bg-slate-950 border-b border-blue-900 flex justify-between items-center">
        <h1 class="font-black text-blue-500 text-sm tracking-widest">ANACOES C2</h1>
        <div id="status" class="text-[8px] text-green-500 uppercase animate-pulse">SISTEMA CONECTADO</div>
    </header>

    <div id="map" class="h-1/3 w-full border-b border-blue-900"></div>

    <nav class="grid grid-cols-5 bg-black p-1">
        <button onclick="tab('sos')" class="p-2 text-[8px] bg-red-950">🚨 SOS</button>
        <button onclick="tab('mon')" class="p-2 text-[8px] bg-blue-950">📡 MON</button>
        <button onclick="tab('com')" class="p-2 text-[8px] bg-amber-950">👥 COM</button>
        <button onclick="tab('log')" class="p-2 text-[8px] bg-green-950">🚚 LOG</button>
        <button onclick="tab('tec')" class="p-2 text-[8px] bg-slate-800">⚙️ TEC</button>
    </nav>

    <main id="app" class="flex-grow p-2 overflow-y-auto">
        <div id="sos" class="tab-content tab-active"><button onclick="SOS()" class="w-full h-32 bg-red-700 rounded-lg font-black text-xl animate-bounce">ACTIVAR PROTOCOLO SOS</button></div>
        <div id="mon" class="tab-content grid-cols-2 gap-2"></div>
        <div id="com" class="tab-content grid-cols-2 gap-2"></div>
        <div id="log" class="tab-content grid-cols-2 gap-2"></div>
        <div id="tec" class="tab-content grid-cols-2 gap-2"></div>
    </main>

    <script>
        const map = L.map('map').setView([10.48, -66.90], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const database = {
            mon: ["Mapa Sismos", "Radar Réplicas", "Profundidad", "Magnitud", "Fallas Activas", "Estaciones", "Tendencia", "Histórico", "Avisos", "Estadísticas"],
            com: ["Voluntarios", "Hospitales", "Agua Potable", "Incendios", "Radio", "Refugios", "Rumores", "Prot. Civil", "Donaciones", "Chat C2"],
            log: ["Ruta Segura", "ETA Ayuda", "Kit Emergencia", "Suministros Sangre", "Batería", "Estado Vías", "Electricidad", "Señal Red", "Evacuación", "Transporte"],
            tec: ["Backup Data", "Bot Config", "Reporte PDF", "Sync Server", "Logs Sistema", "Calibrar GPS", "Modo Offline", "Panel Admin", "Manual", "App PWA"]
        };

        Object.keys(database).forEach(cat => {
            database[cat].forEach(tool => {
                document.getElementById(cat).innerHTML += `<button onclick="exec('${tool}')" class="btn-tool">${tool}</button>`;
            });
        });

        function tab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('tab-active'));
            document.getElementById(id).classList.add('tab-active');
        }

        // LÓGICA DE NEGOCIO REAL (Motor del Sistema)
        async function exec(cmd) {
            const status = document.getElementById('status');
            status.innerText = "PROCESANDO: " + cmd;

            if(cmd === "Mapa Sismos") {
                const res = await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&limit=10");
                const data = await res.json();
                data.features.forEach(f => L.marker([f.geometry.coordinates[1], f.geometry.coordinates[0]]).addTo(map));
                status.innerText = "DATA SÍSMICA CARGADA";
            } 
            else if(cmd.includes("Ruta") || cmd.includes("Refugio") || cmd.includes("Hospital")) {
                alert("Protocolo de Emergencia: Buscando rutas seguras y asistencia médica...");
                status.innerText = "RUTA SEGURA ACTIVADA";
            }
            else {
                console.log("Protocolo iniciado para: " + cmd);
                status.innerText = "MÓDULO " + cmd.toUpperCase() + " OPERATIVO";
            }
        }

        function SOS() {
            navigator.geolocation.getCurrentPosition(p => {
                alert("EMERGENCIA: Coordinando AnacoEs en " + p.coords.latitude + "," + p.coords.longitude);
            });
        }
    </script>
</body>
</html>
