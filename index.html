<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnacoEs | C2 - Operativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { background: #050505; color: #e2e8f0; font-family: sans-serif; }
        .module { display: none; } .module.active { display: grid; }
        .btn-act { @apply bg-slate-900 border border-slate-700 p-3 rounded text-[10px] text-center hover:bg-blue-900 hover:border-blue-500 transition; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <header class="p-3 bg-black border-b border-blue-900 flex justify-between items-center">
        <span class="font-bold text-blue-500">ANACOES | C2</span>
        <div id="sys-log" class="text-[9px] text-green-500 uppercase italic">Sistema en Línea</div>
    </header>

    <div id="map" class="h-1/3 w-full"></div>

    <nav class="flex p-2 gap-1 bg-gray-900">
        <button onclick="show('sos')" class="flex-1 p-2 bg-red-900 text-[9px] font-bold">SOS</button>
        <button onclick="show('mon')" class="flex-1 p-2 bg-blue-900 text-[9px] font-bold">MON</button>
        <button onclick="show('com')" class="flex-1 p-2 bg-amber-900 text-[9px] font-bold">COM</button>
        <button onclick="show('log')" class="flex-1 p-2 bg-green-900 text-[9px] font-bold">LOG</button>
    </nav>

    <main id="main" class="flex-grow p-2 overflow-y-auto">
        <div id="sos" class="module active"><button onclick="act('SOS')" class="w-full h-32 bg-red-600 rounded-lg font-black text-2xl">ALERTA TOTAL</button></div>
        <div id="mon" class="module grid-cols-2 gap-2"></div>
        <div id="com" class="module grid-cols-2 gap-2"></div>
        <div id="log" class="module grid-cols-2 gap-2"></div>
    </main>

    <script>
        const map = L.map('map').setView([10.48, -66.90], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const logic = {
            mon: { "Mapa Sismos": "fetchUSGS()", "Radar Réplicas": "alert('Escaneando fallas locales...')", "Magnitud": "alert('Analizando ondas P y S...')" },
            com: { "Refugios": "alert('Listando refugios seguros en Anaco/Caracas')", "Hospitales": "alert('Localizando centros de salud cercanos')", "Donaciones": "alert('Abriendo censo de suministros')" },
            log: { "Ruta Segura": "alert('Calculando evacuación hacia zonas altas')", "Kit Emergencia": "alert('Protocolo de suministros básicos')" }
        };

        // Renderizado inteligente
        Object.keys(logic).forEach(cat => {
            Object.keys(logic[cat]).forEach(name => {
                document.getElementById(cat).innerHTML += `<button onclick="${logic[cat][name]}" class="btn-act">${name}</button>`;
            });
        });

        function show(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        async function fetchUSGS() {
            document.getElementById('sys-log').innerText = "Conectando al USGS...";
            const res = await fetch("https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&limit=5");
            const data = await res.json();
            data.features.forEach(f => L.circleMarker([f.geometry.coordinates[1], f.geometry.coordinates[0]], {color: 'red'}).addTo(map));
            document.getElementById('sys-log').innerText = "Mapa Sismos: OK";
        }

        function act(cmd) {
            if(cmd === 'SOS') {
                navigator.geolocation.getCurrentPosition(p => {
                    alert(`SOS! Coordinando AnacoEs en: ${p.coords.latitude}, ${p.coords.longitude}`);
                    document.getElementById('sys-log').innerText = "SOS ENVIADO";
                });
            }
        }
    </script>
</body>
</html>
