<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>AnacoEs C2 | Sistema de Gestión de Emergencias</title>
    <style>
        :root { --main: #d32f2f; --dark: #121212; --light: #ffffff; }
        body { margin: 0; display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--dark); color: var(--light); }
        nav { width: 300px; background: #1e1e1e; overflow-y: auto; padding: 15px; border-right: 2px solid var(--main); }
        main { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; }
        .btn-nav { width: 100%; padding: 12px; margin-bottom: 5px; background: #333; color: white; border: none; cursor: pointer; text-align: left; border-radius: 4px; }
        .btn-nav:hover { background: var(--main); }
        #display-panel { background: #252525; padding: 30px; border-radius: 12px; flex-grow: 1; overflow-y: auto; }
        h1 { color: var(--main); margin-top: 0; }
    </style>
</head>
<body>
    <nav id="menu-lateral">
        <h3>Comando AnacoEs C2</h3>
        <!-- Los botones se generarán automáticamente por la lógica -->
    </nav>
    <main>
        <h1>Panel de Operaciones</h1>
        <div id="display-panel">
            <p>Bienvenido al Sistema de Gestión. Seleccione un módulo para iniciar.</p>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>
