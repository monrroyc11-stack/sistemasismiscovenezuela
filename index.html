<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnacoEs | C2 Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body { background: #050505; color: #fff; font-family: 'Orbitron', sans-serif; }
        .panel { background: rgba(17, 24, 39, 0.7); backdrop-filter: blur(12px); border: 1px solid #1f2937; }
        .btn-main { background: linear-gradient(135deg, #1e3a8a, #1e40af); transition: 0.3s; }
        .btn-main:active { transform: scale(0.95); }
        .tab-content { display: none; }
        .tab-content.active { display: grid; }
        ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #3b82f6; }
    </style>
</head>
<body class="p-2 h-screen flex flex-col">

    <!-- HEADER TÁCTICO -->
    <header class="flex justify-between items-center p-4 bg-slate-950 rounded-t-xl border-b border-blue-900">
        <h1 class="text-blue-500 font-bold text-xl tracking-widest">ANACOES <span class="text-white text-xs">C2</span></h1>
        <div id="clock" class="text-[9px] text-green-400 uppercase">Estado: Operativo</div>
    </header>

    <!-- MAPA -->
    <div id="map" class="h-48 w-full border-b border-blue-900"></div>

    <!-- NAVEGACIÓN ICONOGRÁFICA -->
    <nav class="flex justify-between p-2 bg-slate-900">
        <button onclick="toggle('sos')" class="text-xl">🚨</button>
        <button onclick="toggle('mon')" class="text-xl">📡</button>
        <button onclick="toggle('com')" class="text-xl">👥</button>
        <button onclick="toggle('log')" class="text-xl">🚚</button>
        <button onclick="toggle('tec')" class="text-xl">⚙️</button>
    </nav>

    <!-- ÁREA DE HERRAMIENTAS -->
    <div id="main-area" class="flex-grow p-2 overflow-y-auto">
        <div id="sos" class="tab-content active h-full"><button onclick="execute('SOS')" class="w-full h-full bg-red-950 border border-red-500 rounded-xl text-3xl font-black">SOS EMERGENCIA</button></div>
        <div id="mon" class="tab-content grid-cols-2 gap-2"></div>
        <div id="com" class="tab-content grid-cols-2 gap-2"></div>
        <div id="log" class="tab-content grid-cols-2 gap-2"></div>
        <div id="tec" class="tab-content grid-cols-2 gap-2"></div>
    </div>

    <script>
        const map = L.map('map').setView([10.48, -66.90], 6);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const tools = {
            mon: ["📍 Mapa Sismos", "📡 Radar Réplicas", "📉 Profundidad", "📏 Magnitud", "🪨 Fallas", "🏗️ Estaciones", "📈 Tendencia", "📂 Histórico", "🔔 Avisos", "📊 Stats"],
            com: ["👥 Voluntarios", "🏥 Hospitales", "💧 Agua", "🔥 Incendios", "📻 Radio", "🛡️ Refugios", "🚫 Rumores", "📞 Protección Civil", "📦 Donaciones", "💬 Chat"],
            log: ["📍 Rutas", "⏱️ Tiempos", "🔦 Kits", "🩸 Sangre", "🔋 Energía", "🚧 Vías", "⚡ Electricidad", "📶 Redes", "🗺️ Evacuación", "🚁 Transporte"],
            tec: ["💾 Backup", "⚙️ Bot Conf", "📊 Reporte", "🔄 Sincronizar", "📁 Logs", "🛰️ GPS Cal", "📡 Modo Offline", "🛡️ Admin", "📝 Manual", "📱 App PWA"]
        };

        // Renderizado
        Object.keys(tools).forEach(cat => {
            tools[cat].forEach(name => {
                document.getElementById(cat).innerHTML += `<button onclick="execute('${name}')" class="panel p-3 rounded-lg text-[10px] text-left hover:border-blue-500 hover:text-blue-400 transition">${name}</button>`;
            });
        });

        function toggle(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function execute(cmd) {
            document.getElementById('clock').innerText = "Ejecutando: " + cmd;
            if(cmd === 'SOS') {
                navigator.geolocation.getCurrentPosition(pos => {
                    alert("Alerta enviada a AnacoEs desde: " + pos.coords.latitude);
                });
            }
        }
    </script>
</body>
</html>
